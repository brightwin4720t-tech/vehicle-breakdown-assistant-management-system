<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanic Directory | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        h1::before {
            content: '🛡️';
            font-size: 1.5rem;
        }

        .table-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow-x: auto;
            margin-top: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: rgba(15, 23, 42, 0.5);
        }

        th {
            padding: 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-delete {
            color: var(--danger);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: rgba(244, 63, 94, 0.1);
            border-color: var(--danger);
        }

        .btn-back {
            background: var(--success);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
            display: inline-block;
        }
        .btn-back:hover { opacity: 0.9; }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 2rem;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header-section {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
                text-align: center;
            }
            th, td {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>Mechanic Directory Feedback</h1>
        <a href="/admin_dashboard" class="btn-back">← Back to Dashboard</a>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Name</th>
                    <th>Email Address</th>
                    <th>Content</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for mech in feedback %}
                <tr>
                    <td><span class="sno-badge">{{ loop.index }}</span></td>
                    <td><span class="mech-name">{{ mech.name }}</span></td>
                    <td><span class="email-text">{{ mech.email }}</span></td>
                    <td><div class="address-text">{{ mech.content }}</div></td>
                    <td>
                        <a href="/delete_mechanic/{{ mech.name }}" 
                           onclick="return confirm('Are you sure you want to remove this feedback?')" 
                           class="btn-delete">Remove</a>
                    </td>
                </tr>
                {% endfor %}
                
                {% if not feedback %}
                <tr>
                    <td colspan="5" class="empty-state">
                        No feedback found in the database.
                    </td>
                </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
