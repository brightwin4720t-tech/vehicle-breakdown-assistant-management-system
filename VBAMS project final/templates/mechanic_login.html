<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanic Login - BreakdownAssist</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1486006920555-c77dcf18193c?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .login-card {
            background: rgba(26, 32, 44, 0.95);
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-top: 5px solid #ff9f43; /* Mechanic Orange */
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            color: #ff9f43;
        }

        .login-card p {
            text-align: center;
            color: #a0aec0;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #cbd5e0;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff9f43;
            box-shadow: 0 0 0 2px rgba(255, 159, 67, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: #ff9f43;
            color: #1a202c;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: #feca57;
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: #a0aec0;
            text-decoration: none;
        }

        .footer-links a:hover { color: #fff; }

        .icon-box {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="icon-box">🛠️</div>
        <h2>Mechanic Portal</h2>
        <p>Access your dispatch queue and service logs</p>
        
        <form action="/mechanic_login" method="POST">
            <div class="form-group">
                <label for="email">Work Email</label>
                <input type="email" id="email" name="email" placeholder="mechanic@vbams.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Security Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">Open Dispatch Console</button>
        </form>

        <div class="footer-links">
            <a href="/login">Not a Mechanic? User Login</a><br><br>
            <a href="/forgot_password?role=mechanic">Forgot Password?</a>
        </div>
    </div>

</body>
</html>
