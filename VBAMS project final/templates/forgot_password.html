<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | BreakdownAssist</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(23, 29, 43, 0.9);
            --accent-primary: #ff4757;
            --accent-secondary: #ff9f43;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --error-bg: rgba(244, 63, 94, 0.15);
            --error-color: #f43f5e;
            --success-bg: rgba(16, 185, 129, 0.15);
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 71, 87, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 159, 67, 0.08) 0%, transparent 40%);
            padding: 1.5rem;
        }

        .forgot-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-shield {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* Tabs Selection */
        .role-tabs {
            display: flex;
            background: rgba(11, 15, 25, 0.6);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }

        .tab-btn.active.mechanic {
            background: var(--accent-secondary);
            box-shadow: 0 4px 12px rgba(255, 159, 67, 0.3);
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(11, 15, 25, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.25s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.15);
        }

        .mechanic-theme input:focus {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 3px rgba(255, 159, 67, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .mechanic-theme .btn-submit {
            background: var(--accent-secondary);
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.2);
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-error {
            background: var(--error-bg);
            color: var(--error-color);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .footer-links {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

        .footer-links a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .mechanic-theme .footer-links a {
            color: var(--accent-secondary);
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="{% if role == 'mechanic' %}mechanic-theme{% endif %}">

    <div class="forgot-card" id="cardContainer">
        <div class="icon-shield">🔐</div>
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your email and choose a new password</p>

        {% if error %}
        <div class="alert alert-error">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">
            ✅ {{ success }}
        </div>
        <script>
            setTimeout(function() {
                window.location.href = "{{ redirect_url }}";
            }, 3000);
        </script>
        {% endif %}

        <form action="/forgot_password" method="POST" id="resetForm">
            <!-- Hidden input for selected role -->
            <input type="hidden" name="role" id="selectedRole" value="{{ role or 'user' }}">

            <!-- Role Selector Tabs -->
            <div class="role-tabs">
                <button type="button" class="tab-btn {% if not role or role == 'user' %}active{% endif %}" onclick="selectRole('user')">User</button>
                <button type="button" class="tab-btn {% if role == 'mechanic' %}active mechanic{% endif %}" onclick="selectRole('mechanic')">Mechanic</button>
            </div>

            <div class="form-group">
                <label for="email">Registered Email</label>
                <input type="email" id="email" name="email" value="{{ email or '' }}" placeholder="Enter your registered email" required>
            </div>

            <button type="submit" class="btn-submit">Send Reset Link</button>
        </form>

        <div class="footer-links">
            <a href="/login" id="backToLogin">Back to User Login</a>
            <a href="/mechanic_login" id="backToMechLogin">Back to Mechanic Login</a>
        </div>
    </div>

    <script>
        function selectRole(role) {
            const roleInput = document.getElementById('selectedRole');
            const body = document.body;
            const tabButtons = document.querySelectorAll('.tab-btn');
            
            roleInput.value = role;

            tabButtons.forEach(btn => {
                btn.classList.remove('active', 'mechanic');
                if (btn.textContent.trim().toLowerCase() === role) {
                    if (role === 'user') {
                        btn.classList.add('active');
                        body.classList.remove('mechanic-theme');
                    } else {
                        btn.classList.add('active', 'mechanic');
                        body.classList.add('mechanic-theme');
                    }
                }
            });
        }

        document.getElementById('resetForm').addEventListener('submit', function(e) {
            const btn = this.querySelector('.btn-submit');
            setTimeout(() => {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Processing...';
                btn.style.opacity = '0.7';
                btn.style.cursor = 'not-allowed';
            }, 0);
        });
    </script>

</body>
</html>
